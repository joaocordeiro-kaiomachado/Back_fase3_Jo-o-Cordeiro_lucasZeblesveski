<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Tarefas</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        h1{
            color: #333;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        a{
            display: block;
            margin: 15px 0;
            padding: 12px;
            text-decoration: none;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
            transition: 0.3s;
        }

        a:hover{
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1> Sistema de Tarefas</h1>

        <p>Escolha uma opção:</p>

        <a href="/insere-poucos"> Inserir Poucas Tarefas</a>

        <a href="/popula-muitos"> Inserir Muitas Tarefas</a>

        <a href="/tasks"> Ver Tarefas (JSON)</a>
    </div>

</body>
</html>
