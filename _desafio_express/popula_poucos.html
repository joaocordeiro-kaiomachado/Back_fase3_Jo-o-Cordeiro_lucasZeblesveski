<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Popular Poucos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top left,#22c55e 0%,transparent 30%),
#020617;
}

.card{

width:700px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.1);

padding:40px;

border-radius:25px;

text-align:center;

color:white;
}

.icone{
font-size:90px;
}

h1{
margin:20px 0;
color:#4ade80;
}

p{
color:#cbd5e1;
line-height:1.8;
}

.btn{
display:inline-block;
margin-top:25px;
padding:15px 25px;
background:#16a34a;
color:white;
text-decoration:none;
border-radius:10px;
margin-right:10px;
}

.btn:hover{
opacity:.9;
}

</style>

</head>

<body>

<div class="card">

<div class="icone">✅</div>

<h1>Popular Poucos</h1>

<p>

</p>

</a>

</div>
