<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Popular Muitos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top left,#2563eb 0%,transparent 30%),
radial-gradient(circle at bottom right,#06b6d4 0%,transparent 30%),
#020617;

}

.card{

width:750px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.1);

padding:40px;

border-radius:25px;

text-align:center;

color:white;
}

.icone{
font-size:100px;
}

h1{
margin:20px 0;
color:#38bdf8;
}

.info{

background:rgba(37,99,235,.15);

padding:20px;

border-radius:15px;

margin:20px 0;

border-left:5px solid #38bdf8;
}

p{
color:#cbd5e1;
line-height:1.8;
}

.btn{

display:inline-block;

margin-top:20px;

padding:15px 25px;

background:#2563eb;

color:white;

text-decoration:none;

border-radius:10px;
}

.btn:hover{
opacity:.9;
}

</style>

</head>

<body>

<div class="card">

<div class="icone">🚀</div>

<h1>Popular Muitos</h1>

<div class="info">
15 produtos foram adicionados automaticamente ao banco de dados.
</div>

<p>
Esta operação simula uma carga em lote utilizando um laço de repetição,
permitindo testar grandes quantidades de registros.
</p>

<a href="/" class="btn">
 Voltar ao Início
</a>

</div>

</body>
</html>
